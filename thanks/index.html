<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Budgy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --border: rgba(255,255,255,0.08);
      --text: #f0eff5;
      --muted: #7a7990;
      --accent: #7c6af7;
      --accent2: #a594f9;
      --green: #4ade80;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.5s ease-out both;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }

    p {
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2.2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 0.85rem 1.6rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 0 30px rgba(124,106,247,0.25);
    }

    .btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .small-note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.8;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">✅</div>

    <h1>Message received</h1>

    <p>
      Thanks for reaching out to Budgy.<br />
      Your feedback goes directly to the developer.
    </p>

    <a href="/" class="btn">← Back to Budgy</a>

    <div class="small-note">
      We appreciate every message.
    </div>
  </div>
</body>
</html>
