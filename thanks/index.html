<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thanks! — Budgy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --border: rgba(255,255,255,0.07);
      --text: #f0eff5;
      --muted: #7a7990;
      --accent: #7c6af7;
      --accent2: #a594f9;
      --green: #4ade80;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p { color: var(--muted); font-weight: 300; margin-bottom: 2rem; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    a:hover { background: var(--accent2); transform: translateY(-2px); }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .icon { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  </style>
</head>
<body>
  <div class="icon">✅</div>
  <h1>Message received!</h1>
  <p>Thanks for taking the time to reach out.<br />We’ll get back to you if you left an email.</p>
  <a href="/">← Back to Budgy</a>
</body>
</html>
